name: CI

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag exists
        id: check
        run: |
          version=$(grep -m 1 '^version =' Cargo.toml | tr -d '"' | awk '{print $3}')
          echo "Detected version: $version"
          
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag $version exists. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "version=$version" >> $GITHUB_OUTPUT
          else
            echo "New version $version detected."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "version=$version" >> $GITHUB_OUTPUT
          fi

  lint:
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openssl zip curl cmake make pkg-config tar \
            libssl-dev \
            libsasl2-dev \
            libzstd-dev \
            libcurl4-openssl-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check dependencies
        run: cargo deny check licenses bans sources

  test:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openssl zip curl cmake make pkg-config tar \
            libssl-dev \
            libsasl2-dev \
            libzstd-dev \
            libcurl4-openssl-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install cargo-nextest
        run: cargo install --locked cargo-nextest

      - name: Run tests
        run: cargo nextest run

  build-linux:
    runs-on: ubuntu-latest
    needs: [check-version, test]
    if: ${{ needs.check-version.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openssl zip curl cmake make pkg-config tar \
            libssl-dev \
            libsasl2-dev \
            libzstd-dev \
            libcurl4-openssl-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux x86_64
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/kafkadumper dist/kafkadumper-linux-x86_64

      - name: Archive Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/

  build-macos:
    runs-on: macos-latest
    needs: [check-version, test]
    if: ${{ needs.check-version.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: |
          brew install cmake openssl@3 pkg-config

      - name: Build macOS ARM64
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/openssl@3/lib/pkgconfig
        run: |
          cargo build --release --target aarch64-apple-darwin
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/kafkadumper dist/kafkadumper-macos-arm64

      - name: Build macOS x86_64
        env:
          PKG_CONFIG_PATH: /usr/local/opt/openssl@3/lib/pkgconfig
        run: |
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/kafkadumper dist/kafkadumper-macos-x86_64

      - name: Archive macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, check-version]
    if: ${{ needs.check-version.outputs.skip != 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          generateReleaseNotes: true
          makeLatest: true
          artifacts: "dist/*"