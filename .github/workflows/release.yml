name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  RUST_VERSION: "1.94.0"

jobs:
  run-pr-checks:
    uses: ./.github/workflows/pr-checks.yml

  build-linux:
    needs: run-pr-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openssl zip curl cmake make pkg-config tar \
            libssl-dev libsasl2-dev libzstd-dev libcurl4-openssl-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build Linux x86_64
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/kafkadumper dist/kafkadumper-linux-x86_64

      - name: Archive Linux artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-linux
          path: dist/

  build-macos:
    needs: run-pr-checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: |
          brew install cmake openssl@3 pkg-config

      - name: Build macOS ARM64
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/openssl@3/lib/pkgconfig
        run: |
          cargo build --release --target aarch64-apple-darwin
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/kafkadumper dist/kafkadumper-macos-arm64

      - name: Build macOS x86_64
        env:
          PKG_CONFIG_PATH: /usr/local/opt/openssl@3/lib/pkgconfig
        run: |
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/kafkadumper dist/kafkadumper-macos-x86_64

      - name: Archive macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-macos
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generateReleaseNotes: true
          makeLatest: true
          artifacts: "dist/*"