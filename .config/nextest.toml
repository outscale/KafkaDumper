[profile.default]
fail-fast = { max-fail = "all" }
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }

retries = 0

[profile.ci]
fail-fast = false
retries = 1
slow-timeout = { period = "120s", terminate-after = 2 }
status-level = "all"

[profile.ci.junit]
path = "junit-report.xml"
store-success-output = true
store-failure-output = true